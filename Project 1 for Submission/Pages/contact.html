    <meta charset="UTF-8">

<body>
    <header>

    </header>

    <nav>
        <a href="index.html">Home</a>&nbsp;&nbsp;
        <a href="courses.html">Courses</a>&nbsp;&nbsp;
        <a href="contact.html">Contact Us</a>&nbsp;&nbsp;
        <a href="admin.html">Admin</a>

    </nav>

    <main>
        <section>
            <h2>Contact Details</h2>
            <article>
                <h3>Email</h3>
                <a href="mailto:contact@codingninja.com">contact@codingninja.com</a>
            </article>
            <article>
                <h3>Phone</h3>
                <a href="tel:+1-800-123-4567">+1-800-123-4567</a>
            </article>
        </section>

        <section>
            <h2>Our Location</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3502.5346074635827!2d77.19009!3d28.613939!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfd288b1fdfdf%3A0x12345678!2sCoding%20Ninjas!5e0!3m2!1sen!2sin!4v1234567890123" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Coding Ninjas Location"></iframe>
        </section>

        <section>
            <h2>Send us a Message</h2>
            <form>
                <fieldset>
                    <legend>Feedback Form</legend>
                    
                    <p>
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </p>

                    <p>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </p>

                    <p>
                        <label for="subject">Subject:</label>
                        <input type="text" id="subject" name="subject" required>
                    </p>

                    <p>
                        <label for="message">Message:</label>
                        <br>
                        <textarea id="message" name="message" rows="5" cols="40" required></textarea>
                    </p>

                    <p>
                        <button type="submit">Submit</button>
                    </p>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Coding Ninjas. All rights reserved.</p>
    </footer>
