<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Coding Ninjas</title>
</head>
<body>
    <header>
        <img src="../Multimedia/new_cn_logo.svg" alt="coding ninjas logo">
    </header>
    <main>
        <h1>Create an Account</h1>

        <form>
            <fieldset>
                <legend>Personal Information</legend>

                <p>
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </p>

                <p>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </p>

                <p>
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </p>

                <p>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </p>

                <p>
                    <label for="usertype">User Type:</label>
                    <select id="usertype" name="usertype" required>
                        <option value="">Select user type</option>
                        <option value="student">Student</option>
                        <option value="instructor">Instructor</option>
                        <option value="admin">Admin</option>
                    </select>
                </p>

                <p>
                    <label for="course">Select Course:</label>
                    <select id="course" name="course" required>
                        <option value="">Course 1 - Web Development</option>
                        <option value="course2">Course 2 - Android Development</option>
                        <option value="course3">Course 3 - Digital Marketing</option>
                        <option value="course4">Course 4 - Data Science Fundamentals</option>
                    </select>
                </p>

                <button type="submit">Register</button>
            </fieldset>
        </form>
    </main>
</body>
</html>
