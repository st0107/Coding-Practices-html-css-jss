<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Website</title>
</head>
<body>
   <!-- Navigation Menu (Accessible on all pages) -->
   <nav>
        <h1>Welcome to Our Restaurant</h1>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="dishes.html">Dishes</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <!-- Contact Us Page (contact.html) -->
    <section id="contact">
        <h1>Contact Us</h1>
        <h3>For inquiries, you can reach us via email or phone</h3>
        <p><b>Email:</b> info@ourrestaurant.com</p>
        <p><b>Phone:</b> +1 (555) 123-4567</p>
        
        <div style="border: 1px solid; padding:10px;">
            <h2>Feedback Form</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <br><br>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <br><br>
                
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone">
                <br><br>
                
                <label for="message">Feedback/Message:</label>
                <textarea id="message" name="message" rows="5" cols="40" required></textarea>
                <br><br>
                
                <label for="rating">Rate Your Experience:</label>
                <select id="rating" name="rating" required>
                    <option value="">Select a rating</option>
                    <option value="5">★★★★★ Excellent</option>
                    <option value="4">★★★★ Good</option>
                    <option value="3">★★★ Average</option>
                    <option value="2">★★ Poor</option>
                    <option value="1">★ Very Poor</option>
                </select>
                <br><br>
                
                <button type="submit">Submit Feedback</button>
                <button type="reset">Clear</button>
            </form>
        </div>
    </section>
</body>
</html>
